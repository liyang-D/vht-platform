services:
  postgres:
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"

  orchestrator:
    ports:
      - "127.0.0.1:${ORCHESTRATOR_PORT:-8000}:8000"

  llm:
    ports:
      - "127.0.0.1:${LLM_PORT:-8020}:8000"

  asr:
    ports:
      - "127.0.0.1:${ASR_HTTP_PORT:-8030}:9000"
      - "127.0.0.1:${ASR_GRPC_PORT:-5030}:50051"

  tts:
    ports:
      - "127.0.0.1:${TTS_HTTP_PORT:-8040}:8000"

  simple-chat-backend:
    ports:
      - "127.0.0.1:${SIMPLE_CHAT_BACKEND_PORT:-8010}:8010"

  simple-chat-frontend:
    ports:
      - "${SIMPLE_CHAT_FRONTEND_PORT:-5173}:80"

  adminer:
    image: adminer:5-standalone
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${ADMINER_PORT:-8080}:8080"
