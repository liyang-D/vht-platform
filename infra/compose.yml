services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vht_dev}
      POSTGRES_USER: ${POSTGRES_USER:-vht_dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build:
      context: ..
      dockerfile: platform_core/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://vht_dev:change-me-dev@postgres:5432/vht_dev}
      DEFAULT_PROJECT_NAME: ${DEFAULT_PROJECT_NAME:-Mini Project Template}
      SIMPLE_CHAT_ACCESS_KEY: ${SIMPLE_CHAT_ACCESS_KEY:-dev-template-key}
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m platform_core.database.init_db
    restart: "no"

  orchestrator:
    build:
      context: ..
      dockerfile: services/orchestrator/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://vht_dev:change-me-dev@postgres:5432/vht_dev}
      LLM_API_BASE_URL: ${LLM_API_BASE_URL:-http://llm:8000/v1}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai-compatible}
      LLM_API_KEY: ${LLM_API_KEY:-EMPTY}
      LLM_MODEL: ${LLM_MODEL:-Qwen/Qwen3-30B-A3B-Instruct-2507}
      ORCHESTRATOR_LLM_MAX_CONCURRENT_REQUESTS: ${ORCHESTRATOR_LLM_MAX_CONCURRENT_REQUESTS:-4}
      ORCHESTRATOR_ASR_MAX_CONCURRENT_REQUESTS: ${ORCHESTRATOR_ASR_MAX_CONCURRENT_REQUESTS:-1}
      ORCHESTRATOR_TTS_MAX_CONCURRENT_REQUESTS: ${ORCHESTRATOR_TTS_MAX_CONCURRENT_REQUESTS:-1}
      RUNTIME_REQUEST_MAX_RETRIES: ${RUNTIME_REQUEST_MAX_RETRIES:-2}
      RUNTIME_REQUEST_RETRY_BACKOFF_SECONDS: ${RUNTIME_REQUEST_RETRY_BACKOFF_SECONDS:-0.5}
      ASR_PROVIDER: ${ASR_PROVIDER:-riva}
      ASR_MODEL: ${ASR_MODEL:-parakeet-1-1b-ctc-en-us}
      ASR_DEFAULT_DOMAIN: ${ASR_DEFAULT_DOMAIN:-default}
      ASR_DEFAULT_MODE: ${ASR_DEFAULT_MODE:-offline}
      ASR_DOMAIN_CONFIG_PATH: ${ASR_DOMAIN_CONFIG_PATH:-/app/services/orchestrator/config/asr_domains.json}
      RIVA_ASR_HTTP_URL: ${RIVA_ASR_HTTP_URL:-http://asr:9000}
      RIVA_ASR_LANGUAGE: ${RIVA_ASR_LANGUAGE:-en-US}
      RIVA_ASR_ENABLE_AUTOMATIC_PUNCTUATION: ${RIVA_ASR_ENABLE_AUTOMATIC_PUNCTUATION:-true}
      RIVA_ASR_BOOSTED_WORDS_FIELD: ${RIVA_ASR_BOOSTED_WORDS_FIELD:-boosted_words}
      RIVA_ASR_BOOST_SCORE_FIELD: ${RIVA_ASR_BOOST_SCORE_FIELD:-boost_score}
      TTS_PROVIDER: ${TTS_PROVIDER:-chatterbox}
      TTS_MODEL: ${TTS_MODEL:-chatterbox-turbo}
      CHATTERBOX_TTS_HTTP_URL: ${CHATTERBOX_TTS_HTTP_URL:-http://tts:8000}
      CHATTERBOX_TTS_VOICE: ${CHATTERBOX_TTS_VOICE:-default}
      RIVA_TTS_HTTP_URL: ${RIVA_TTS_HTTP_URL:-http://tts-riva:9000}
      RIVA_TTS_LANGUAGE: ${RIVA_TTS_LANGUAGE:-en-US}
      RIVA_TTS_VOICE: ${RIVA_TTS_VOICE:-Magpie-Multilingual.EN-US.Aria}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      DEEPGRAM_ASR_MODEL: ${DEEPGRAM_ASR_MODEL:-nova-3}
      DEEPGRAM_TTS_MODEL: ${DEEPGRAM_TTS_MODEL:-aura-2-thalia-en}
    depends_on:
      migrate:
        condition: service_completed_successfully
      llm-warmup:
        condition: service_completed_successfully
      asr:
        condition: service_healthy
      tts:
        condition: service_healthy
    expose:
      - "8000"

  llm:
    image: vllm/vllm-openai:latest
    gpus: all
    ipc: host
    shm_size: "16gb"
    security_opt:
      - seccomp=unconfined
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HOME: /root/.cache/huggingface
    volumes:
      - huggingface_cache:/root/.cache/huggingface
      - ../services/runtime/vllm/loras:/models/loras:ro
    command:
      - --model
      - ${LLM_MODEL:-Qwen/Qwen3-30B-A3B-Instruct-2507}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --scheduling-policy
      - priority
      - --enable-lora
      - --gpu-memory-utilization
      - ${LLM_GPU_MEMORY_UTILIZATION:-0.65}
      - --max-model-len
      - ${LLM_MAX_MODEL_LEN:-16384}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)\"",
        ]
      start_period: 2h
      interval: 30s
      timeout: 5s
      retries: 20
    expose:
      - "8000"

  asr:
    image: nvcr.io/nim/nvidia/${ASR_NIM_CONTAINER_ID:-parakeet-1-1b-ctc-en-us}:${ASR_NIM_TAG:-latest}
    user: "0:0"
    gpus: all
    shm_size: "8gb"
    ulimits:
      nofile:
        soft: 2048
        hard: 2048
    environment:
      NGC_API_KEY: ${NGC_API_KEY:-}
      NIM_HTTP_API_PORT: 9000
      NIM_GRPC_API_PORT: 50051
      NIM_TAGS_SELECTOR: ${ASR_NIM_TAGS_SELECTOR:-name=parakeet-1-1b-ctc-en-us,mode=all}
      NIM_CACHE_PATH: /opt/nim/.cache
    volumes:
      - nim_asr_cache:/opt/nim/.cache
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/v1/health/ready"]
      start_period: 45m
      interval: 30s
      timeout: 5s
      retries: 20
    expose:
      - "9000"
      - "50051"

  tts:
    build:
      context: ..
      dockerfile: services/runtime/tts/chatterbox/Dockerfile
    gpus: all
    shm_size: "4gb"
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HOME: /root/.cache/huggingface
      CHATTERBOX_TTS_MODEL: ${CHATTERBOX_TTS_MODEL:-chatterbox-turbo}
      CHATTERBOX_TTS_DEVICE: ${CHATTERBOX_TTS_DEVICE:-cuda}
      CHATTERBOX_TTS_VOICE: ${CHATTERBOX_TTS_VOICE:-default}
      CHATTERBOX_TTS_AUDIO_PROMPT_PATH: ${CHATTERBOX_TTS_AUDIO_PROMPT_PATH:-}
    volumes:
      - huggingface_cache:/root/.cache/huggingface
      - ../services/runtime/tts/voices:/voices:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/health/ready', timeout=2)\"",
        ]
      start_period: 20m
      interval: 30s
      timeout: 5s
      retries: 20
    expose:
      - "8000"

  tts-riva:
    image: nvcr.io/nim/nvidia/${TTS_NIM_CONTAINER_ID:-magpie-tts-multilingual}:${TTS_NIM_TAG:-latest}
    profiles:
      - riva-tts
    user: "0:0"
    gpus: all
    shm_size: "8gb"
    environment:
      NGC_API_KEY: ${NGC_API_KEY:-}
      NIM_HTTP_API_PORT: 9000
      NIM_GRPC_API_PORT: 50051
      NIM_TAGS_SELECTOR: ${TTS_NIM_TAGS_SELECTOR:-name=magpie-tts-multilingual,batch_size=8}
      NIM_CACHE_PATH: /opt/nim/.cache
    volumes:
      - nim_tts_cache:/opt/nim/.cache
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/v1/health/ready"]
      start_period: 45m
      interval: 30s
      timeout: 5s
      retries: 20
    expose:
      - "9000"
      - "50051"

  llm-warmup:
    image: curlimages/curl:8.16.0
    environment:
      LLM_MODEL: ${LLM_MODEL:-Qwen/Qwen3-30B-A3B-Instruct-2507}
    depends_on:
      llm:
        condition: service_healthy
    command:
      [
        "-fsS",
        "-X",
        "POST",
        "http://llm:8000/v1/chat/completions",
        "-H",
        "Content-Type: application/json",
        "-d",
        "{\"model\":\"${LLM_MODEL:-Qwen/Qwen3-30B-A3B-Instruct-2507}\",\"messages\":[{\"role\":\"user\",\"content\":\"hello\"}],\"max_tokens\":8}",
      ]
    restart: "no"

  simple-chat-backend:
    build:
      context: ..
      dockerfile: apps/simple-chat/backend/Dockerfile
    environment:
      ORCHESTRATOR_URL: http://orchestrator:8000
      SIMPLE_CHAT_ACCESS_KEY: ${SIMPLE_CHAT_ACCESS_KEY:-dev-template-key}
      SIMPLE_CHAT_CORS_ALLOW_ORIGINS: ${SIMPLE_CHAT_CORS_ALLOW_ORIGINS:-}
      SIMPLE_CHAT_COOKIE_SECURE: ${SIMPLE_CHAT_COOKIE_SECURE:-false}
      SIMPLE_CHAT_ORCHESTRATOR_TIMEOUT_SECONDS: ${SIMPLE_CHAT_ORCHESTRATOR_TIMEOUT_SECONDS:-300}
    depends_on:
      orchestrator:
        condition: service_started
    expose:
      - "8010"

  simple-chat-frontend:
    build:
      context: ..
      dockerfile: apps/simple-chat/frontend/Dockerfile
    environment:
      BACKEND_UPSTREAM: http://simple-chat-backend:8010
      BACKEND_PROXY_TIMEOUT: ${BACKEND_PROXY_TIMEOUT:-300s}
    depends_on:
      simple-chat-backend:
        condition: service_started

volumes:
  postgres_data:
  huggingface_cache:
  nim_asr_cache:
  nim_tts_cache:
